kind = "web"
previewPath = "/"
title = "QR & Barcode Scanner"
version = "1.0.0"
id = "artifacts/qr-scanner"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20354

[services.development]
run = "pnpm --filter @workspace/qr-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qr-scanner", "run", "build" ]
serve = "static"
publicDir = "artifacts/qr-scanner/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20354"
BASE_PATH = "/"
